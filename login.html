<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login – ResumeAI</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0f1a;--surface:#111827;--surface2:#1a2236;--border:#1f2d45;--accent:#3b82f6;--text:#e2e8f0;--muted:#64748b;--success:#10b981;--danger:#ef4444}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;border-bottom:1px solid var(--border);background:rgba(11,15,26,.9);backdrop-filter:blur(20px)}
.logo{font-size:1.2rem;font-weight:700;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:.5rem}
.logo span{background:linear-gradient(135deg,#3b82f6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px}
.card h1{font-size:1.6rem;font-weight:700;margin-bottom:.35rem}
.card p{color:var(--muted);font-size:.875rem;margin-bottom:1.75rem}
.tabs{display:flex;gap:.5rem;margin-bottom:1.75rem}
.tab{flex:1;padding:.55rem;border:1px solid var(--border);border-radius:8px;background:none;color:var(--muted);font-size:.875rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.group{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1rem}
.group label{font-size:.78rem;font-weight:600;color:var(--muted)}
.group input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;font-family:inherit}
.group input:focus{border-color:var(--accent)}
.btn{width:100%;padding:.8rem;margin-top:.5rem;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s}
.btn:hover{opacity:.88}
.err{color:#fca5a5;font-size:.82rem;margin-bottom:.75rem;display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);padding:.6rem .8rem;border-radius:6px}
.suc{color:#6ee7b7;font-size:.82rem;margin-bottom:.75rem;display:none;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);padding:.6rem .8rem;border-radius:6px}
.foot{margin-top:1.25rem;text-align:center;font-size:.83rem;color:var(--muted)}
.foot a{color:var(--accent);text-decoration:none}
.back{display:flex;align-items:center;gap:.4rem;margin-top:1.5rem;justify-content:center;color:var(--muted);text-decoration:none;font-size:.85rem;transition:color .2s}
.back:hover{color:var(--text)}
.btn-google{display:flex;align-items:center;justify-content:center;gap:.65rem;width:100%;padding:.75rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.875rem;font-weight:600;cursor:pointer;font-family:inherit;transition:border-color .2s;margin-bottom:.6rem}
.btn-google:hover{border-color:#4285F4}
.btn-github{display:flex;align-items:center;justify-content:center;gap:.65rem;width:100%;padding:.75rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.875rem;font-weight:600;cursor:pointer;font-family:inherit;transition:border-color .2s;margin-bottom:.6rem}
.btn-github:hover{border-color:#aaa}
.divider-row{display:flex;align-items:center;gap:.75rem;margin:.75rem 0;color:var(--muted);font-size:.8rem}
.divider-row::before,.divider-row::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">🧠 <span>ResumeAI</span></a>
</nav>
<main>
  <div class="card">
    <h1>Welcome back</h1>
    <p>Sign in to save analyses and track progress</p>

    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="tab" id="tabReg" onclick="switchTab('reg')">Sign Up</button>
    </div>

    <button class="btn-google" onclick="socialLogin('google')">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <button class="btn-github" onclick="socialLogin('github')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      Continue with GitHub
    </button>
    <div class="divider-row">or use email</div>

    <div id="errBox" class="err"></div>
    <div id="sucBox" class="suc"></div>

    <!-- LOGIN FORM -->
    <div id="formLogin">
      <div class="group"><label>Email</label><input type="email" id="lEmail" placeholder="you@example.com"/></div>
      <div class="group"><label>Password</label><input type="password" id="lPass" placeholder="••••••••"/></div>
      <button class="btn" onclick="doLogin()">Sign In →</button>
      <div class="foot">No account? <a href="#" onclick="switchTab('reg');return false">Sign up free</a></div>
    </div>

    <!-- REGISTER FORM -->
    <div id="formReg" style="display:none">
      <div class="group"><label>Full Name</label><input type="text" id="rName" placeholder="John Doe"/></div>
      <div class="group"><label>Email</label><input type="email" id="rEmail" placeholder="you@example.com"/></div>
      <div class="group"><label>Password</label><input type="password" id="rPass" placeholder="min. 6 characters"/></div>
      <button class="btn" onclick="doRegister()">Create Account →</button>
      <div class="foot">Already registered? <a href="#" onclick="switchTab('login');return false">Sign in</a></div>
    </div>

    <a href="/" class="back">← Back to home</a>
  </div>
</main>
<script>
const Auth = {
  getUsers()    { return JSON.parse(localStorage.getItem('rai_users')   || '{}'); },
  saveUsers(u)  { localStorage.setItem('rai_users', JSON.stringify(u)); },
  setSession(s) { localStorage.setItem('rai_session', JSON.stringify(s)); },
  isLoggedIn()  { return !!localStorage.getItem('rai_session'); }
};

function socialLogin(provider) {
  const name  = provider === 'google' ? 'Google User' : 'GitHub User';
  const email = provider + '_user@demo.local';
  const users = Auth.getUsers();
  if (!users[email]) { users[email] = { name, pass: '__social__' }; Auth.saveUsers(users); }
  Auth.setSession({ email, name });
  showSuc('Signed in with ' + (provider === 'google' ? 'Google' : 'GitHub') + '! Redirecting…');
  setTimeout(() => { window.location.href = '/dashboard.html'; }, 800);
}

if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

function switchTab(t) {
  document.getElementById('formLogin').style.display = t==='login' ? 'block' : 'none';
  document.getElementById('formReg').style.display   = t==='reg'   ? 'block' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', t==='login');
  document.getElementById('tabReg').classList.toggle('active', t==='reg');
  clearMsg();
}
function showErr(m){ const e=document.getElementById('errBox'); e.textContent=m; e.style.display='block'; document.getElementById('sucBox').style.display='none'; }
function showSuc(m){ const e=document.getElementById('sucBox'); e.textContent=m; e.style.display='block'; document.getElementById('errBox').style.display='none'; }
function clearMsg(){ document.getElementById('errBox').style.display='none'; document.getElementById('sucBox').style.display='none'; }

function doRegister() {
  const name  = document.getElementById('rName').value.trim();
  const email = document.getElementById('rEmail').value.trim().toLowerCase();
  const pass  = document.getElementById('rPass').value;
  if (!name||!email||!pass) { showErr('Please fill in all fields.'); return; }
  if (pass.length < 6) { showErr('Password must be at least 6 characters.'); return; }
  const users = Auth.getUsers();
  if (users[email]) { showErr('This email is already registered.'); return; }
  users[email] = { name, pass };
  Auth.saveUsers(users);
  showSuc('Account created! Signing you in…');
  setTimeout(() => { Auth.setSession({ email, name }); window.location.href = '/dashboard.html'; }, 1000);
}

function doLogin() {
  const email = document.getElementById('lEmail').value.trim().toLowerCase();
  const pass  = document.getElementById('lPass').value;
  if (!email||!pass) { showErr('Enter email and password.'); return; }
  const users = Auth.getUsers();
  if (!users[email] || users[email].pass !== pass) { showErr('Wrong email or password.'); return; }
  Auth.setSession({ email, name: users[email].name });
  showSuc('Welcome back, ' + users[email].name + '!');
  setTimeout(() => { window.location.href = '/dashboard.html'; }, 700);
}

// Enter key support
document.addEventListener('keydown', e => { if (e.key === 'Enter') { document.getElementById('formLogin').style.display !== 'none' ? doLogin() : doRegister(); } });
</script>
</body>
</html>
