<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login - ResumeAI</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0f1a;--surface:#111827;--surface2:#1a2236;--border:#1f2d45;--accent:#dc2626;--accent2:#ef4444;--text:#e2e8f0;--muted:#64748b;--success:#10b981;--danger:#ef4444;--radius:14px}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;border-bottom:1px solid var(--border);background:rgba(11,15,26,.9);backdrop-filter:blur(20px)}
.logo{font-size:1.2rem;font-weight:700;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:.5rem}
.logo span{background:linear-gradient(135deg,#dc2626,#ef4444);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px}
.card h1{font-size:1.6rem;font-weight:700;margin-bottom:.35rem}
.card p{color:var(--muted);font-size:.875rem;margin-bottom:1.75rem}
.warning{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#fca5a5;padding:.8rem;border-radius:8px;font-size:.8rem;margin-bottom:1.5rem}
.group{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1rem}
.group label{font-size:.78rem;font-weight:600;color:var(--muted)}
.group input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;font-family:inherit}
.group input:focus{border-color:var(--accent)}
.btn{width:100%;padding:.8rem;margin-top:.5rem;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s}
.btn:hover{opacity:.88}
.err{color:#fca5a5;font-size:.82rem;margin-bottom:.75rem;display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);padding:.6rem .8rem;border-radius:6px}
.suc{color:#6ee7b7;font-size:.82rem;margin-bottom:.75rem;display:none;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);padding:.6rem .8rem;border-radius:6px}
.foot{margin-top:1.25rem;text-align:center;font-size:.83rem;color:var(--muted)}
.foot a{color:var(--accent);text-decoration:none}
.back{display:flex;align-items:center;gap:.4rem;margin-top:1.5rem;justify-content:center;color:var(--muted);text-decoration:none;font-size:.85rem;transition:color .2s}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">Admin <span>ResumeAI</span></a>
</nav>
<main>
  <div class="card">
    <h1>Admin Access</h1>
    <p>Enter administrative credentials</p>

    <div class="warning">
      <strong>Warning:</strong> This is a restricted area for authorized administrators only.
    </div>

    <div id="errBox" class="err"></div>
    <div id="sucBox" class="suc"></div>

    <div class="group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter admin username" autocomplete="username">
    </div>
    <div class="group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter admin password" autocomplete="current-password">
    </div>
    
    <button class="btn" onclick="doLogin()">Login to Admin Panel</button>
    
    <div class="foot">
      <a href="/">Back to main site</a>
    </div>

    <a href="/" class="back">Return to ResumeAI</a>
  </div>
</main>
<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  
  if (!username || !password) {
    showErr('Please enter username and password');
    return;
  }

  clearMsg();

  try {
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ username, password })
    });

    const data = await response.json();

    if (response.ok) {
      showSuc('Login successful! Redirecting...');
      setTimeout(() => {
        window.location.href = '/admin.html';
      }, 1000);
    } else {
      showErr(data.error || 'Login failed');
    }
  } catch (error) {
    console.error('Login error:', error);
    showErr('Network error. Please try again.');
  }
}

function showErr(m) { 
  const e = document.getElementById('errBox'); 
  e.textContent = m; 
  e.style.display = 'block'; 
  document.getElementById('sucBox').style.display = 'none'; 
}

function showSuc(m) { 
  const e = document.getElementById('sucBox'); 
  e.textContent = m; 
  e.style.display = 'block'; 
  document.getElementById('errBox').style.display = 'none'; 
}

function clearMsg() { 
  document.getElementById('errBox').style.display = 'none'; 
  document.getElementById('sucBox').style.display = 'none'; 
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    doLogin();
  }
});

// Auto-focus username field
document.getElementById('username').focus();
</script>
</body>
</html>
